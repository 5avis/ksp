version: '3.8'
services:
  neo4j:
    image: neo4j:5.15.0
    container_name: crime_neo4j
    environment:
      - NEO4J_AUTH=neo4j/crimepassword
      - NEO4J_PLUGINS=["apoc"]
    ports:
      - "7474:7474"
      - "7687:7687"
    volumes:
      - neo4j_data:/data

  qdrant:
    image: qdrant/qdrant:latest
    container_name: crime_qdrant
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrant_data:/qdrant/storage

  postgres:
    image: postgres:15
    container_name: crime_postgres
    environment:
      - POSTGRES_USER=crimeuser
      - POSTGRES_PASSWORD=crimepassword
      - POSTGRES_DB=crimedb
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  neo4j_data:
  qdrant_data:
  postgres_data:
